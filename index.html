<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FunTools - Merpati Premium ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --pink-soft: #ffdee9; --pink-bold: #ff85a2; --cream: #fff5f5; --text: #7d5a5a; }
        body { font-family: 'Poppins', sans-serif; background: var(--cream); margin: 0; color: var(--text); display: flex; flex-direction: column; align-items: center; }
        
        /* Container Iklan */
        .ad-box { width: 100%; max-width: 400px; min-height: 100px; margin: 10px auto; display: flex; justify-content: center; align-items: center; background: #fff; border-radius: 15px; overflow: hidden; border: 1px dashed var(--pink-soft); }

        nav { background: rgba(255,255,255,0.9); backdrop-filter: blur(5px); width: 100%; display: none; justify-content: space-around; padding: 12px 0; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--pink-soft); }
        nav button { background: none; border: none; font-weight: 600; font-size: 11px; cursor: pointer; color: var(--text); }

        .container { background: white; width: 92%; max-width: 400px; margin: 15px auto; padding: 25px; border-radius: 30px; box-shadow: 0 10px 25px rgba(255,182,193,0.2); text-align: center; box-sizing: border-box; }
        h2 { font-family: 'Dancing Script', cursive; color: var(--pink-bold); font-size: 30px; margin-bottom: 20px; }

        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #fff5f6; border-radius: 12px; font-family: 'Poppins', sans-serif; box-sizing: border-box; }
        .main-btn { background: linear-gradient(45deg, #ffb6c1, #ff85a2); color: white; border: none; padding: 14px; border-radius: 15px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; }

        /* Visualisasi Badan Full Body */
        .visual-container { margin-top: 20px; padding: 15px; background: #fffcfc; border-radius: 20px; display: none; }
        .body-img { width: 140px; height: auto; margin: 10px auto; display: block; filter: drop-shadow(0 5px 8px rgba(0,0,0,0.1)); }
        
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 2000; display: flex; justify-content: center; align-items: center; flex-direction: column; }
        .spinner { width: 40px; height: 40px; border: 4px solid var(--pink-soft); border-top: 4px solid var(--pink-bold); border-radius: 50%; animation: spin 1s infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader"><div class="spinner"></div><p>Memuat...</p></div>

<div class="ad-box">
    <script src="https://pl28970450.profitablecpmratenetwork.com/34/83/cc/3483cc01879a0b87f5698fca3d8b6067.js"></script>
</div>

<nav id="main-nav">
    <button onclick="showPage('ideal')">📏 Ideal</button>
    <button onclick="showPage('pesan')">📩 Pesan</button>
    <button onclick="showPage('jodoh')">❤️ Jodoh</button>
    <button onclick="window.logout()">🚪 Keluar</button>
</nav>

<div class="container">
    <section id="page-login" class="content-page">
        <h2>Halo, Merpati! ✨</h2>
        <button class="main-btn" onclick="window.handleLogin()">Masuk dengan Google</button>
    </section>

    <div id="main-content" style="display:none;">
        
        <section id="ideal" class="sub-page">
            <h2>Body Visualizer</h2>
            <select id="gender">
                <option value="wanita">👩 Wanita</option>
                <option value="pria">👨 Pria</option>
            </select>
            <input type="number" id="tinggi" placeholder="Tinggi (cm)">
            <input type="number" id="berat" placeholder="Berat (kg)">
            <button class="main-btn" onclick="window.hitungVisual()">Lihat Bentuk Tubuh</button>
            
            <div id="hasilBMI" class="visual-container">
                <p id="status-teks" style="font-weight:bold; font-size: 18px; color: var(--pink-bold);"></p>
                <img id="img-visual" class="body-img" src="">
                <p id="saran-teks" style="font-size:12px; margin-top:10px;"></p>
            </div>
        </section>

        <section id="pesan" class="sub-page" style="display:none;">
            <h2>Kotak Rahasia</h2>
            <div id="link-display" style="font-size:10px; background:#f9f9f9; padding:10px; border-radius:10px; word-break:break-all;"></div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px; margin-top:10px;">
                <button class="main-btn" style="font-size:10px;" onclick="window.copyLink()">Salin</button>
                <button class="main-btn" style="font-size:10px; background:#25D366;" onclick="window.shareWA()">WhatsApp</button>
            </div>
            <button class="main-btn" style="font-size:11px;" onclick="window.shareIG()">Share ke IG Story</button>
            <div id="list-pesan" style="margin-top:20px;"></div>
        </section>

        <section id="jodoh" class="sub-page" style="display:none;">
            <h2>Love Meter</h2>
            <input type="text" id="nama1" placeholder="Nama Kamu">
            <input type="text" id="nama2" placeholder="Nama Pasangan">
            <button class="main-btn" onclick="window.cekJodoh()">Cek ❤️</button>
            <h1 id="hasilJodoh" style="color:var(--pink-bold);"></h1>
        </section>
    </div>

    <section id="page-send-msg" class="content-page" style="display:none;">
        <h2>Kirim Pesan ✨</h2>
        <textarea id="anon-text" rows="4" placeholder="Tulis rahasia..."></textarea>
        <button class="main-btn" onclick="window.sendToFirebase()">Kirim 🤫</button>
    </section>
</div>

<div class="ad-box">
    <script src="https://pl28971006.profitablecpmratenetwork.com/b5/06/21/b5062164c8e2ce615f79e8b920276e0b.js"></script>
</div>

<div class="footer-name" style="color:#ccc; font-size:10px; margin-bottom:20px;">merpati digital creative</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, query, where, onSnapshot, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBRUMOALHTCiJ83lBc1KaYc0QcsSIfw5ek",
        authDomain: "webanonymous-128cd.firebaseapp.com",
        projectId: "webanonymous-128cd",
        storageBucket: "webanonymous-128cd.firebasestorage.app",
        messagingSenderId: "789801328425",
        appId: "1:789801328425:web:67467f05e1e2fa2ecba138"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();
    const urlParams = new URLSearchParams(window.location.search);
    const receiverID = urlParams.get('to');

    window.handleLogin = () => signInWithPopup(auth, provider);
    window.logout = () => signOut(auth).then(() => location.href = location.origin + location.pathname);

    onAuthStateChanged(auth, (user) => {
        document.getElementById('loader').style.display = 'none';
        if (user) {
            if (receiverID && receiverID !== user.uid) { 
                showSection('page-send-msg'); 
            } else { 
                showSection('main-content'); 
                document.getElementById('main-nav').style.display = 'flex';
                setupUser(user);
            }
        } else {
            showSection(receiverID ? 'page-send-msg' : 'page-login');
        }
    });

    function showSection(id) {
        document.querySelectorAll('.content-page').forEach(s => s.style.display = 'none');
        document.getElementById(id).style.display = 'block';
    }

    window.showPage = (id) => {
        document.querySelectorAll('.sub-page').forEach(p => p.style.display = 'none');
        document.getElementById(id).style.display = 'block';
    }

    function setupUser(user) {
        const link = window.location.origin + window.location.pathname + "?to=" + user.uid;
        document.getElementById('link-display').innerText = link;
        const q = query(collection(db, "messages"), where("receiverID", "==", user.uid), orderBy("timestamp", "desc"));
        onSnapshot(q, (s) => {
            let h = ""; s.forEach(d => h += `<div style="background:#fffcfc; padding:10px; margin:5px; border-left:4px solid var(--pink-bold); text-align:left; font-size:12px;">${d.data().text}</div>`);
            document.getElementById('list-pesan').innerHTML = h || "Belum ada pesan.";
        });
    }

    // LOGIKA BODY VISUALIZER (FULL BODY)
    window.hitungVisual = () => {
    const gen = document.getElementById('gender').value;
    const bb = parseFloat(document.getElementById('berat').value);
    const tb = parseFloat(document.getElementById('tinggi').value);
    if(!bb || !tb) return alert("Isi data dulu ya!");

    const bmi = bb / ((tb/100)**2);
    const res = document.getElementById('hasilBMI');
    res.style.display = "block";
    
    let txt = "", img = "", srn = "";

    if(gen === 'wanita') {
        if(bmi < 18.5) {
            txt = "Kurus (Underweight)";
            // Ikon Wanita Langsing
            img = "https://cdn-icons-png.flaticon.com/512/6997/6997662.png"; 
            srn = "Tubuhmu sangat ramping. Pastikan asupan nutrisi tercukupi agar tetap berenergi!";
        } else if(bmi < 25) {
            txt = "Ideal ✨";
            // Ikon Wanita Proporsional
            img = "https://cdn-icons-png.flaticon.com/512/6997/6997671.png"; 
            srn = "Wah, bentuk tubuhmu sangat proporsional! Pertahankan pola hidup sehatmu.";
        } else {
            txt = "Berisi (Overweight)";
            // Ikon Wanita Berisi (Mirip referensi gambar yang kamu unggah)
            img = "https://cdn-icons-png.flaticon.com/512/6997/6997674.png"; 
            srn = "Tubuhmu terlihat berisi dan menggemaskan. Jangan lupa olahraga ringan agar tetap bugar.";
        }
    } else {
        // Logika untuk Pria
        if(bmi < 18.5) {
            txt = "Kurus";
            img = "https://cdn-icons-png.flaticon.com/512/4140/4140037.png";
            srn = "Tubuhmu terlihat kurang berisi, coba tambah porsi makan dan protein.";
        } else if(bmi < 25) {
            txt = "Ideal";
            img = "https://cdn-icons-png.flaticon.com/512/4140/4140048.png";
            srn = "Tubuhmu tegap dan ideal. Keren!";
        } else {
            txt = "Berisi";
            img = "https://cdn-icons-png.flaticon.com/512/4140/4140047.png";
            srn = "Sudah mulai berisi, yuk mulai rutin jalan santai atau cardio.";
        }
    }

    document.getElementById('status-teks').innerText = txt;
    document.getElementById('img-visual').src = img;
    document.getElementById('saran-teks').innerText = srn;
};

    window.copyLink = () => { navigator.clipboard.writeText(document.getElementById('link-display').innerText).then(()=>alert("Tersalin!")); };
    window.shareWA = () => { window.open("https://wa.me/?text=Kirim pesan rahasia: " + document.getElementById('link-display').innerText); };
    window.shareIG = () => { window.copyLink(); alert("Link disalin! Buka IG Story."); window.location.href="instagram://story-camera"; };
    
    window.sendToFirebase = async () => {
        const t = document.getElementById('anon-text').value;
        if(!t) return;
        await addDoc(collection(db, "messages"), { receiverID, text: t, timestamp: serverTimestamp() });
        alert("Terkirim!");
        location.href = location.origin + location.pathname;
    };
    
    window.cekJodoh = () => { 
        document.getElementById('hasilJodoh').innerText = Math.floor(Math.random()*40 + 60) + "% ❤️"; 
    };
</script>

</body>
</html>
